<style>
    :root {
      --ink: #1a1b24;
      --muted: #454655;
      --line: #e3e1ee;
      --bg: #ffffff;
      --primary: #001bcc; /* Vibrant Kinetic Blue */
      --secondary: #7a2dd3;
      --surface-container-low: #f4f2ff;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
    }

    .topbar {
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 max(32px, calc((100vw - 1240px)/2));
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .phb-logo {
      display: block;
      width: auto;
      height: 34px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .brand-divider {
      width: 1px;
      height: 28px;
      background: var(--line);
      margin: 0 2px;
      flex-shrink: 0;
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      background: var(--primary);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 13px;
    }

    .hero-banner {
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 32px 64px;
    }

    .role-card {
      transition: all 0.3s ease;
      border: 1px solid var(--line);
      padding: 32px;
      background: var(--surface-container-low);
      border-radius: 0.5rem;
    }

    .role-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 27, 204, 0.04);
      border-color: var(--primary);
      background: #ffffff;
    }

    .role-icon {
      width: 44px;
      height: 44px;
      border-radius: 4px;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 16px;
      background: #e3e1ee;
      color: var(--on-surface-variant);
    }

    .role-card:hover .role-icon {
      background: var(--primary);
      color: #fff;
    }

    .btn {
      border-radius: 4px;
      padding: 10px 20px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-ghost {
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .btn-ghost:hover {
      background: var(--surface-container-low);
    }

    .arrow-link {
      color: var(--primary);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.1em;
      position: relative;
      display: inline-block;
      padding-bottom: 4px;
    }

    .arrow-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--primary);
      transition: width 0.3s;
    }

    .role-card:hover .arrow-link::after {
      width: 32px;
    }

    .card { 
      background: var(--surface-container-low); 
      border: 1px solid var(--line); 
      border-radius: 0.25rem;
      padding: 32px; 
    }
    
    .table-card { 
      background: #ffffff; 
      border: 1px solid var(--line); 
      border-radius: 0.25rem; 
      overflow: hidden; 
    }

    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 16px 20px; border-bottom: 1px solid var(--line); }
    th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); background: var(--surface-container-low); font-weight: 600; }
    tbody tr:hover { background: var(--surface-container-low); cursor: pointer; }
    .badge { display: inline-flex; padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; background: #e3e1ee; color: var(--on-surface-variant); }
    .badge.submitted { background: #dfe0ff; color: #000865; }
    .badge.review { background: #eedcff; color: #290054; }
    .badge.ready, .badge.approved { background: #dfe0ff; color: #000865; }
    .badge.returned { background: #ffdad6; color: #93000a; }

    .toast {
      position: fixed;
      right: 32px;
      bottom: 32px;
      background: var(--inverse-surface);
      color: var(--inverse-on-surface);
      padding: 16px 24px;
      border-radius: 4px;
      opacity: 0;
      transform: translateY(10px);
      transition: 0.3s;
      pointer-events: none;
      z-index: 200;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .toast.show { opacity: 1; transform: none; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .field input, .field select, .field textarea {
      font: inherit;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      width: 100%;
    }
    .field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0, 27, 204, 0.05); }
    .field input[type="file"] { padding: 9px 12px; background: #fff; }
    .field input[type="file"]::file-selector-button { border: 0; border-radius: 3px; padding: 7px 12px; margin-right: 12px; background: var(--primary); color: #fff; font: inherit; font-size: 11px; font-weight: 700; cursor: pointer; }
    .conditional-field.hidden { display: none; }

    .cost-sheet,.financial-sheet{width:100%;max-width:620px;display:flex;flex-direction:column;gap:12px}.cost-row,.financial-row{display:grid;grid-template-columns:minmax(190px,1fr) 16px minmax(180px,230px);align-items:center;gap:10px}.cost-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.cost-separator{text-align:center;color:var(--muted);font-weight:700}.cost-row .field{display:block}.cost-row .field label{display:none}.cost-row input{text-align:right}.cost-row>strong{text-align:right;display:block;white-space:nowrap}.cost-summary-row{padding:11px 0;border-top:1px solid var(--line)}.cost-summary-row .cost-label{color:var(--ink)}.cost-summary-row strong{text-align:right;font-size:16px;color:var(--primary);white-space:nowrap}.cost-grand-total{padding:14px 0;border-top:2px solid var(--primary);border-bottom:1px solid var(--line)}.cost-grand-total strong{font-size:20px}@media(max-width:640px){.cost-row,.financial-row{grid-template-columns:1fr;gap:6px}.cost-row .cost-separator{display:none}.cost-summary-row,.cost-grand-total{grid-template-columns:1fr auto}}.financial-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.financial-separator{text-align:center;color:var(--muted);font-weight:700}.financial-row .field{display:block}.financial-row .field label{display:none}.financial-row input{text-align:right;width:100%}.financial-row .field,.cost-row .field{width:100%}.financial-balance{padding:14px 0;border-top:2px solid var(--primary)}.financial-balance .financial-label{color:var(--ink)}.financial-balance strong{text-align:right;display:block;font-size:20px;color:var(--primary);white-space:nowrap}@media(max-width:640px){.financial-row{grid-template-columns:1fr;gap:6px}.financial-row .financial-separator{display:none}.financial-balance{grid-template-columns:1fr auto}}
    .mandays-sheet {
      width: 100%;
      max-width: 620px;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(180px, 1fr) minmax(210px, 1fr);
      gap: 18px;
      align-items: end;
    }
    .mandays-field { min-width: 0; display: flex; flex-direction: column; gap: 6px; }
    .mandays-field label {
      min-height: 30px;
      font-size: 9px;
      line-height: 1.35;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }
    .mandays-field input { text-align: right; width: 100%; height: 40px; padding: 9px 11px; }
    .mandays-balance-output {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--surface-container-lowest);
      color: var(--ink);
      font-size: 14px;
      font-weight: 400;
      line-height: 1;
    }
    @media (max-width: 760px) {
      .mandays-sheet { grid-template-columns: 1fr; gap: 16px; }
    }

    /* Timeline Styles */
    .timeline { list-style: none; padding: 0; margin: 0; margin-left: 8px; }
    .timeline li { position: relative; padding-left: 32px; padding-bottom: 24px; border-left: 2px solid var(--line); }
    .timeline li:last-child { border-left-color: transparent; padding-bottom: 0; }
    .timeline li.active { border-left-color: var(--primary); }
    .timeline li::before { content: ""; position: absolute; left: -7px; top: 4px; width: 12px; height: 12px; border-radius: 50%; background: #c5c5d8; transition: background 0.3s; }
    .timeline li.active::before { background: var(--primary); }
    .timeline li strong { font-size: 11px; display: block; margin-bottom: 4px; font-weight: 700; }
    .timeline li small { font-size: 10px; color: var(--muted); display: block; }
    .timeline li.active strong { color: var(--primary); }

    @media (max-width: 860px) {
      .shell { padding: 24px 20px 48px; }
      .phb-logo { height: 28px; max-width: 105px; }
      .brand-divider { height: 24px; }
    }
  </style>
</head>

<main aria-live="polite" id="app"></main>
<div class="toast" id="toast" role="status"></div>
<script>
    const USERS = {
      applicant: { email: 'hakimi@phb.com.my', password: 'hakimi123', name: 'Amirul Hakimi', employeeNo: 'PHB26-104', position: 'Executive', company: 'Pelaburan Hartanah Berhad', department: 'Corporate Services' },
      hod: { email: 'hod@demo.com', password: 'HOD123', name: 'Head of Department', role: 'hod', label: 'Head of Department' },
      ldStaff: { email: 'shahidah@phb.com.my', password: 'shahidah123', name: 'L&D Staff', role: 'ldStaff', label: 'L&D Staff' },
      ldHead: { email: 'zuliana@phb.com.my', password: 'zuliana123', name: 'Head of L&D', role: 'ldHead', label: 'Head of L&D' },
      chief: { email: 'chief.executive@demo.com', password: 'Chief123', name: 'Chief Executive', role: 'chief', label: 'Chief Executive Level' }
    };
    const ADMIN_USERS = [USERS.ldStaff, USERS.ldHead];
    // Replace each blank email with the corresponding Microsoft 365 email before SharePoint/Power Automate integration.
    const FINAL_APPROVERS = [
      { key: 'head-division-legal-company-secretarial', label: 'Head of Division (Legal & Company Secretarial)', email: '' },
      { key: 'head-division-human-capital', label: 'Head of Division (Human Capital)', email: '' },
      { key: 'head-division-corporate-strategy', label: 'Head of Division (Corporate Strategy)', email: '' },
      { key: 'chief-investment-officer', label: 'Chief Investment Officer', email: '' },
      { key: 'chief-financial-officer', label: 'Chief Financial Officer', email: '' },
      { key: 'group-managing-director', label: 'Group Managing Director', email: '' },
      { key: 'chairman', label: 'Chairman', email: '' }
    ];

    const KEY = 'taf_demo_applications_v1';
    let session = JSON.parse(sessionStorage.getItem('taf_session') || 'null');
    let selectedId = null;

    const $ = s => document.querySelector(s);
    const val = id => document.getElementById(id)?.value?.trim() || '';
    const currencyVal = id => Number(val(id).replace(/,/g, '')) || 0;
    const currencyNumber = value => Number(String(value ?? 0).replace(/,/g, '')) || 0;
    const currencyDisplay = value => currencyNumber(value).toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    function setupCurrencyInputs(scope = document) {
      scope.querySelectorAll('input[data-currency="true"]').forEach(input => {
        const showFormatted = () => {
          const numericValue = currencyNumber(input.value);
          input.type = 'text';
          input.inputMode = 'decimal';
          input.value = currencyDisplay(numericValue);
        };
        const enableSpinner = () => {
          const numericValue = currencyNumber(input.value);
          input.type = 'number';
          input.step = '0.05';
          input.min = '0';
          input.value = numericValue.toFixed(2);
          requestAnimationFrame(() => input.select());
        };
        input.addEventListener('focus', enableSpinner);
        input.addEventListener('blur', showFormatted);
        input.addEventListener('change', () => {
          const rounded = Math.round(currencyNumber(input.value) * 20) / 20;
          input.value = rounded.toFixed(2);
          input.dispatchEvent(new Event('input', { bubbles: true }));
        });
        showFormatted();
      });
    }

    function seed() {
      if (localStorage.getItem(KEY)) return;
      localStorage.setItem(KEY, JSON.stringify([{
        id: 'TA-2026-001',
        owner: USERS.applicant.email,
        created: '2026-07-18T09:30:00',
        status: 'Pending L&D Review',
        participant: { name: 'Amirul Hakimi', employeeNo: 'PHB26-104', position: 'Executive', company: 'Pelaburan Hartanah Berhad', department: 'Corporate Services' },
        initialApprover: { role: 'Head of Department / Division / Company', email: 'min@phb.com.my' },
        program: {
          title: 'Strategic Communication Essentials',
          objectives: 'Strengthen stakeholder communication and presentation skills.',
          start: '2026-08-12',
          end: '2026-08-13',
          days: 2,
          venue: 'Kuala Lumpur',
          organizer: 'Professional Learning Centre',
          fee: 1800, travel: 120, hotel: 0, others: 0, tax: 144,
          type: 'Soft Skills', typeOthers: '', location: 'Local - Within Klang Valley', method: 'Physical', tna: 'Yes', attachment: null
        },
        ld: {
          budgetType: 'Department Training Budget',
          approvedBudget: 25000,
          expensesToDate: 14200,
          totalCost: 2064,
          balance: 8736,
          evaluation: 'Yes',
          hrdc: 'Yes',
          targetHours: 40,
          achievedHours: 24,
          balanceHours: 16,
          notes: 'Pending HRDC supporting documents.'
        },
        history: [
          { at: '2026-07-18T09:30:00', text: 'Application submitted; pending Head of Department approval' },
          { at: '2026-07-19T11:00:00', text: 'Approved by Head of Department' },
          { at: '2026-07-20T14:10:00', text: 'Pending review by L&D Staff' }
        ]
      }]));
    }

    const DATA_MIGRATION_KEY = 'taf_status_mapping_v3';
    function canonicalStatus(status) {
      const map = {
        'Submitted': 'Pending HOD Approval',
        'Under HOD Review': 'Pending HOD Approval',
        'HOD Approved': 'Pending L&D Review',
        'Under L&D Review': 'Pending L&D Review',
        'Ready for Further Approval': 'Pending Head of L&D Concurrence',
        'L&D Verified': 'Pending Head of L&D Concurrence',
        'Pending L&D Head Approval': 'Pending Head of L&D Concurrence',
        'Pending Chief Executive Approval': 'Pending Final Approval',
        'Pending Final Approval': 'Pending Final Approval',
        'Final Approved': 'Approved'
      };
      return map[status] || status;
    }
    function apps() {
      const records = JSON.parse(localStorage.getItem(KEY) || '[]');
      let changed = false;
      records.forEach(record => {
        const normalized = canonicalStatus(record.status);
        if (normalized !== record.status) { record.status = normalized; changed = true; }
      });
      if (changed) localStorage.setItem(KEY, JSON.stringify(records));
      return records;
    }
    function saveApps(a) { localStorage.setItem(KEY, JSON.stringify(a)); }
    function migrateDemoData() {
      if (localStorage.getItem(DATA_MIGRATION_KEY)) return;
      const records = apps();
      const aina = records.find(record => record.id === 'TA-2026-001' || (record.participant && record.participant.name === 'Amirul Hakimi'));
      if (aina) {
        aina.status = 'Pending L&D Review';
        aina.history = aina.history || [];
        if (!aina.history.some(item => /Approved by Head of Department/i.test(item.text || ''))) {
          aina.history.push({ at: '2026-07-19T11:00:00', text: 'Approved by Head of Department through Teams Approvals' });
        }
      }
      saveApps(records);
      localStorage.setItem(DATA_MIGRATION_KEY, 'completed');
    }
    function migrateApplicantIdentity() {
      const records = apps();
      let changed = false;
      records.forEach(record => {
        const isExistingExample = record.id === 'TA-2026-001' ||
          (record.participant && ['Aina Rahman', 'Amirul Hakimi'].includes(record.participant.name));
        if (!isExistingExample) return;
        record.owner = USERS.applicant.email;
        record.participant = record.participant || {};
        record.participant.name = USERS.applicant.name;
        record.program = record.program || {};
        record.program.days = 2;
        record.initialApprover = record.initialApprover || { role: 'Head of Department / Division / Company' };
        record.initialApprover.email = 'min@phb.com.my';
        changed = true;
      });
      if (changed) saveApps(records);
    }

    function money(n) { return new Intl.NumberFormat('en-MY', { style: 'currency', currency: 'MYR' }).format(Number(n) || 0); }
    function date(v) { return v ? new Intl.DateTimeFormat('en-MY', { dateStyle: 'medium' }).format(new Date(v)) : '—'; }
    function statusClass(s) {
      s = s.toLowerCase();
      if (s.includes('approved')) return 'approved';
      if (s.includes('ready')) return 'ready';
      if (s.includes('return')) return 'returned';
      if (s.includes('review')) return 'review';
      return 'submitted';
    }
    function badge(s) { return `<span class="badge ${statusClass(s)}">${s}</span>`; }
    function toast(m) {
      const t = $('#toast');
      t.textContent = m;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function setUser() {
      const el = $('#userArea');
      if (session) {
        el.classList.remove('hidden');
        $('#userLabel').textContent = session.name;
      } else el.classList.add('hidden');
    }

    function route(name, param) {
      selectedId = param || selectedId;
      location.hash = name;
      render();
    }

    function render() {
      setUser();
      const r = location.hash.slice(1) || 'welcome';
      if (r === 'welcome') welcome();
      else if (r === 'login') login();
      else if (!session) route('welcome');
      else if (r === 'applicant') applicantHome();
      else if (r === 'new') applicationForm();
      else if (r === 'edit') applicationForm(selectedId || sessionStorage.getItem('selectedId'));
      else if (r === 'admin') adminList();

        if (!emailPattern.test(initialApproverEmail)) {
          toast('Please enter a valid Head of Department / Division / Company email');
          document.getElementById('initialApproverEmail').focus();
          return;

        const attachmentFile = document.getElementById('attachment').files[0];

            participant,
            initialApprover: { role: 'Head of Department / Division / Company', email: initialApproverEmail },
            program: p, ld: {}, history: [{ at: new Date().toISOString(), text: `Application submitted; Teams Approval to be sent to ${initialApproverEmail}` }]
          });
          saveApps(a);
          toast('Application submitted for Head of Department approval');
        }
        route('applicant');
      };

    function field(label, id, value = '', type = 'text', required = false) {

    function currencyField(label, id, value = 0, required = false) {
      return `<div class="field"><label for="${id}">${label}</label><input id="${id}" type="number" value="${currencyNumber(value).toFixed(2)}" min="0" step="0.05" inputmode="decimal" data-currency="true" ${required ? 'required' : ''} class="text-sm text-right"></div>`;

    }

    function generateApplicationSummaryPdf(application) {
      if (!window.jspdf || !window.jspdf.jsPDF) {
        toast('PDF generator could not be loaded. Please check your connection and try again.');
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4', compress: true });
      const pageWidth = 210, pageHeight = 297, margin = 10, contentWidth = pageWidth - margin * 2;
      const participant = application.participant || {}, p = application.program || {}, ld = application.ld || {};
      const clean = value => String(value === undefined || value === null || value === '' ? '-' : value)
        .replace(/[–—−]/g, '-').replace(/[^\x20-\x7E]/g, ' ');
      const when = value => value ? new Intl.DateTimeFormat('en-MY', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(value)) : '-';
      const day = value => value ? new Intl.DateTimeFormat('en-MY', { dateStyle: 'medium' }).format(new Date(value)) : '-';
      const amount = value => `RM ${currencyNumber(value).toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      const residual = ld.balance ?? ((Number(ld.approvedBudget) || 0) - (Number(ld.expensesToDate) || 0) - (Number(ld.totalCost) || total(p)));
      const balanceHours = ld.balanceHours ?? ((Number(ld.targetHours) || 0) - (Number(ld.achievedHours) || 0));
      const history = Array.isArray(application.history) ? application.history : [];

      const section = (title, y) => {
        doc.setFillColor(244, 242, 255); doc.rect(margin, y, contentWidth, 5.6, 'F');
        doc.setTextColor(0, 27, 204); doc.setFont('helvetica', 'bold'); doc.setFontSize(6.8);
        doc.text(title, margin + 2, y + 3.8);
        return y + 8.0;
      };
      const field = (label, value, x, y, width=91) => {
        const contentX = x + 2;
        const contentWidth = Math.max(10, width - 2);
        doc.setFont('helvetica', 'bold'); doc.setTextColor(69,70,85); doc.setFontSize(5.2); doc.text(clean(label).toUpperCase(), contentX, y);
        doc.setFont('helvetica', 'normal'); doc.setTextColor(26,27,36); doc.setFontSize(6.4);
        const lines = doc.splitTextToSize(clean(value), contentWidth).slice(0,2); doc.text(lines, contentX, y+2.8);
        return y + 6 + (lines.length > 1 ? 2.2 : 0);
      };
      const pair = (l1,v1,l2,v2,y) => Math.max(field(l1,v1,margin,y,91), field(l2,v2,108,y,91));
      const statusTime = (patterns, fallback='-') => {
        const item = [...history].reverse().find(entry => patterns.some(pattern => pattern.test(String(entry.text || ''))));
        return item ? when(item.at) : fallback;
      };

      doc.setFillColor(0,27,204); doc.rect(0,0,pageWidth,15,'F');
      doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(12);
      doc.text('PHB  |  TRAINING APPLICATION SUMMARY', margin, 7);
      doc.setFont('helvetica','normal'); doc.setFontSize(6.2);
      doc.text(`Reference: ${clean(application.id)}  |  Status: ${clean(canonicalStatus(application.status))}  |  Generated: ${when(new Date())}`, margin, 11.7);

      let y=18;
      y=section('SECTION A - PARTICIPANT DETAILS',y);
      y=pair('Full Name',participant.name,'Employee No.',participant.employeeNo,y);
      y=pair('Position',participant.position,'Company',participant.company,y);
      y=field('Department / Unit',participant.department,margin,y,contentWidth);

      y=section('SECTION B - PROGRAMME DETAILS',y+1.8);
      y=field('Programme Title',p.title,margin,y,contentWidth);
      y=field('Objectives',p.objectives,margin,y,contentWidth);
      y=pair('Start Date',day(p.start),'End Date',day(p.end),y);
      y=pair('Days',p.days,'Venue / Online Platform',p.venue,y);
      y=pair('Organizer',p.organizer,'Training Type',p.type,y);
      y=pair('Training Type - Others',p.typeOthers,'Training Location',p.location,y);
      y=pair('Training Method',p.method,'TNA Alignment',p.tna,y);
      y=field('Brochures / Details Attachment',p.attachment && p.attachment.name ? p.attachment.name : 'No attachment',margin,y,contentWidth);

      const calculationRow = (label, sign, value, y, totalRow=false) => {
        if (totalRow) { doc.setDrawColor(0,27,204); doc.setLineWidth(0.35); doc.line(margin,y-0.6,pageWidth-margin,y-0.6); }
        doc.setTextColor(totalRow ? 0 : 69,totalRow ? 27 : 70,totalRow ? 204 : 85);
        doc.setFont('helvetica',totalRow ? 'bold' : 'normal'); doc.setFontSize(totalRow ? 6.7 : 6.1);
        doc.text(clean(label),margin+2,y+3.4);
        doc.setFont('helvetica','bold'); doc.text(sign,145,y+3.4,{align:'center'});
        doc.setFont('helvetica',totalRow ? 'bold' : 'normal'); doc.text(clean(value),pageWidth-margin-2,y+3.4,{align:'right'});
        return y+5.7;
      };
      y=section('SECTION C - COST ESTIMATES',y+1.8);
      y=calculationRow('Fees (RM)',':',amount(p.fee),y);
      y=calculationRow('Travel - Approx. (RM)','+',amount(p.travel),y);
      y=calculationRow('Hotel - Approx. (RM)','+',amount(p.hotel),y);
      y=calculationRow('Others - Approx. (RM)','+',amount(p.others),y);
      y=calculationRow('Sub-total (RM)','=',amount((Number(p.fee)||0)+(Number(p.travel)||0)+(Number(p.hotel)||0)+(Number(p.others)||0)),y,true);
      y=calculationRow('Government Tax (RM)','+',amount(p.tax),y);
      y=calculationRow('Grand Total (RM)','=',amount(total(p)),y,true);

      y=section('SECTION D - FINANCIAL ADMINISTRATION',y+1.8);
      doc.setFont('helvetica','bold'); doc.setTextColor(69,70,85); doc.setFontSize(5.2); doc.text('BUDGET SOURCE',margin+2,y);
      doc.setFont('helvetica','normal'); doc.setTextColor(26,27,36); doc.setFontSize(6.4); doc.text(clean(ld.budgetType),margin+2,y+2.8);
      y += 6.0;
      y=calculationRow('Allocated Budget (RM)',':',amount(ld.approvedBudget),y);
      y=calculationRow('Utilized to Date (RM)','-',amount(ld.expensesToDate),y);
      y=calculationRow('Current Application Cost (RM)','-',amount(ld.totalCost || total(p)),y);
      y=calculationRow('Residual Balance (RM)','= ',amount(residual),y,true);
      y += 2.2;
      y=pair('Post-Training Evaluation',ld.evaluation,'HRDC Claim Eligibility',ld.hrdc,y);

      y=section('SECTION E - TRAINING MANDAYS MONITORING',y+1.8);
      y=pair('Minimum Target of Man-hours',Math.round(Number(ld.targetHours||0)),'Man-hours Achieved as at to Date',Math.round(Number(ld.achievedHours||0)),y);
      y=field('Balance of Man-hours to Achieve',Math.round(Number(balanceHours)),margin,y,contentWidth);

      y=section('SECTION F - APPROVAL PROGRESS SUMMARY',y+1.8);
      const statusRows = [
        { label: '1. Application Submitted', time: statusTime([/application submitted/i, /resubmitted/i], when(application.created)), email: application.owner },
        { label: '2. Head of Department / Division / Company Approval', time: statusTime([/approved by head of department/i, /hod approved/i]), email: application.initialApprover && application.initialApprover.email },
        { label: '3. L&D Staff Review & Verification', time: statusTime([/verified by l&d staff/i, /forwarded to head of l&d/i]), email: USERS.ldStaff && USERS.ldStaff.email },
        { label: '4. Head of L&D Concurrence', time: statusTime([/concurrence given by head of l&d/i]), email: USERS.ldHead && USERS.ldHead.email },
        { label: `5. Final Approval${application.finalApprover && application.finalApprover.label ? ' - ' + clean(application.finalApprover.label) : ''}`, time: statusTime([/final approved/i, /final approval completed/i, /approved by final approver/i]), email: application.finalApprover && application.finalApprover.email }
      ];
      statusRows.forEach((row,index) => {
        const pending = row.time === '-';
        const statusText = pending ? 'Pending' : row.time;
        const visibleEmail = !pending && row.email ? row.email : '';
        const rowHeight = visibleEmail ? 9.2 : 7.2;
        doc.setFillColor(index % 2 ? 251 : 247, index % 2 ? 248 : 246, 255); doc.rect(margin,y,contentWidth,rowHeight-0.5,'F');
        doc.setTextColor(26,27,36); doc.setFont('helvetica','bold'); doc.setFontSize(6.2); doc.text(clean(row.label),margin+2,y+3.7);
        doc.setTextColor(pending ? 117 : 0,pending ? 118 : 27,pending ? 135 : 204); doc.setFont('helvetica','normal'); doc.setFontSize(6.1);
        doc.text(statusText,pageWidth-margin-2,y+3.7,{align:'right'});
        if (visibleEmail) {
          doc.setTextColor(117,118,135); doc.setFont('helvetica','normal'); doc.setFontSize(5.2);
          doc.text(clean(visibleEmail),margin+2,y+6.8);
        }
        y += rowHeight;
      });
      doc.setTextColor(117,118,135); doc.setFont('helvetica','normal'); doc.setFontSize(5.2);
      doc.text('Generated from the L&D Training Application Portal record.',margin,pageHeight-4);
      while (doc.getNumberOfPages()>1) doc.deletePage(doc.getNumberOfPages());
      doc.save(`${clean(application.id).replace(/[^A-Za-z0-9_-]/g,'_')}-Application-Summary.pdf`);
    }

    function adminSections(l, p, editable) {
      const displayValue = value => value === undefined || value === null || value === '' ? '—' : value;
      const readOnlyItem = (label, value, extra = '') => `
        <div class="${extra}">
          <label class="text-[9px] uppercase font-bold text-on-surface-variant block mb-1">${label}</label>
          <span class="font-bold text-base block">${displayValue(value)}</span>
        </div>`;
      const residual = l.balance ?? ((Number(l.approvedBudget) || 0) - (Number(l.expensesToDate) || 0) - (Number(l.totalCost) || total(p)));
      const mandaysBalance = l.balanceHours ?? ((Number(l.targetHours) || 0) - (Number(l.achievedHours) || 0));

      if (!editable) return `
        <div class="space-y-8">
          <section class="card">
            <div class="flex items-center gap-3 mb-6">
              <span class="w-7 h-7 rounded bg-primary text-white flex items-center justify-center font-bold text-[10px]">D</span>
              <h2 class="text-lg font-bold tracking-tight">Financial Administration</h2>
            </div>
            <div class="mb-6 max-w-[620px]">
              ${readOnlyItem('Budget Source', l.budgetType)}
            </div>
            <div class="cost-sheet">
              <div class="cost-row"><span class="cost-label">Allocated Budget (RM)</span><span class="cost-separator">:</span><strong>${money(l.approvedBudget || 0)}</strong></div>
              <div class="cost-row"><span class="cost-label">Utilized to Date (RM)</span><span class="cost-separator">−</span><strong>${money(l.expensesToDate || 0)}</strong></div>
              <div class="cost-row"><span class="cost-label">Current Application Cost (RM)</span><span class="cost-separator">−</span><strong>${money(l.totalCost || total(p))}</strong></div>
              <div class="cost-row cost-summary-row cost-grand-total"><span class="cost-label">Residual Balance (RM)</span><span class="cost-separator">=</span><strong>${money(residual)}</strong></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-y-6 gap-x-10 mt-6 pt-2 max-w-[620px]">
              ${readOnlyItem('Post-Training Evaluation', l.evaluation)}
              ${readOnlyItem('HRDC Claim Eligibility', l.hrdc)}
            </div>
          </section>
          <section class="card">
            <div class="flex items-center gap-3 mb-6">
              <span class="w-7 h-7 rounded bg-primary text-white flex items-center justify-center font-bold text-[10px]">E</span>
              <h2 class="text-lg font-bold tracking-tight">Training Mandays Monitoring</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-y-6 gap-x-8 max-w-[620px]">
              ${readOnlyItem('Minimum Target of Man-hours', Math.round(Number(l.targetHours || 0)))}
              ${readOnlyItem('Man-hours Achieved as at to Date', Math.round(Number(l.achievedHours || 0)))}
              ${readOnlyItem('Balance of Man-hours to Achieve', Math.round(Number(mandaysBalance)))}
            </div>
          </section>
        </div>`;

      return `
        <form id="ldForm" class="space-y-8">
          <section class="card">
            <div class="flex items-center gap-3 mb-6">
              <span class="w-7 h-7 rounded bg-primary text-white flex items-center justify-center font-bold text-[10px]">D</span>
              <div>
                <h2 class="text-lg font-bold tracking-tight">Financial Administration</h2>
                
              </div>
            </div>
            <div class="field mb-6 max-w-[620px]"><label for="budgetType">Budget Source</label><input id="budgetType" type="text" value="${l.budgetType || ''}" class="text-sm"></div>
            <div class="financial-sheet">
              <div class="financial-row"><span class="financial-label">Allocated Budget (RM)</span><span class="financial-separator">:</span>${currencyField('Allocated Budget (RM)', 'approvedBudget', l.approvedBudget || 0)}</div>
              <div class="financial-row"><span class="financial-label">Utilized to Date (RM)</span><span class="financial-separator">−</span>${currencyField('Utilized to Date (RM)', 'expensesToDate', l.expensesToDate || 0)}</div>
              <div class="financial-row"><span class="financial-label">Current Application Cost (RM)</span><span class="financial-separator">−</span>${currencyField('Current Application Cost (RM)', 'totalCost', l.totalCost || total(p))}</div>
              <div class="financial-row financial-balance"><span class="financial-label">Residual Balance (RM)</span><span class="financial-separator">=</span><strong id="residualBalanceDisplay">${money(residual)}</strong></div>
              <input id="balance" type="hidden" value="${Number(residual).toFixed(2)}">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-3 pt-4 border-t border-line max-w-[620px]">
              ${selectWith('Post-Training Evaluation', 'evaluation', ['Yes', 'No'], l.evaluation)}
              ${selectWith('HRDC Claim Eligibility', 'hrdc', ['Yes', 'No'], l.hrdc)}
            </div>
          </section>
          <section class="card">
            <div class="flex items-center gap-3 mb-6">
              <span class="w-7 h-7 rounded bg-primary text-white flex items-center justify-center font-bold text-[10px]">E</span>
              <h2 class="text-lg font-bold tracking-tight">Training Mandays Monitoring</h2>
            </div>
            <div class="mandays-sheet">
              <div class="mandays-field"><label for="targetHours">Minimum Target of<br>Man-hours</label><input id="targetHours" type="number" value="${l.targetHours || 0}" min="0" step="1" class="text-sm"></div>
              <div class="mandays-field"><label for="achievedHours">Man-hours Achieved<br>as at to Date</label><input id="achievedHours" type="number" value="${l.achievedHours || 0}" min="0" step="1" class="text-sm"></div>
              <div class="mandays-field"><label for="balanceHoursDisplay">Balance of Man-hours<br>to Achieve</label><output id="balanceHoursDisplay" class="mandays-balance-output" for="targetHours achievedHours">${Math.round(Number(mandaysBalance))}</output><input id="balanceHours" type="hidden" value="${Math.round(Number(mandaysBalance))}"></div>
            </div>
          </section>
        </form>`;
    }

    function selectWith(label, id, opts, v) {
      return `<div class="field"><label>${label}</label><select id="${id}" class="bg-white text-sm">${opts.map(o => `<option ${o === v ? 'selected' : ''}>${o}</option>`).join('')}</select></div>`;
    }

    function processTracker(x) {
      const stages = [
        '1. Application Submitted',
        '2. Head of Department / Division / Company Approval · via Teams',
        '3. L&D Staff Review & Verification',
        '4. Head of L&D Concurrence',
        `5. Final Approval · via Teams${x.finalApprover && x.finalApprover.label ? ' — ' + x.finalApprover.label : ''}`
      ];
      const status = canonicalStatus(x.status);
      const stateMap = {
        'Pending HOD Approval': { completedThrough: 0, current: 1 },
        'Pending L&D Review': { completedThrough: 1, current: 2 },
        'Pending Head of L&D Concurrence': { completedThrough: 2, current: 3 },
        'Pending Final Approval': { completedThrough: 3, current: 4 },
        'Approved': { completedThrough: 4, current: -1 }
      };
      const state = stateMap[status] || { completedThrough: 0, current: -1 };
      const stopped = status.includes('Returned') || status.includes('Rejected');
      const returnedToLdStaff = status === 'Pending L&D Review' && x.returnRemark && x.returnRemark.to === 'L&D Staff';
      const returnStatus = returnedToLdStaff ? 'Returned to L&D Staff' : status;
      const showReturnNotice = stopped || returnedToLdStaff;
      return `<div class="card !bg-white">
        <h2 class="text-[9px] font-extrabold uppercase tracking-widest text-on-surface-variant mb-6 border-b border-line pb-3">Approval Progress</h2>
        <ol class="timeline">${stages.map((label, i) => {
          const completed = !stopped && i <= state.completedThrough;
          const current = !stopped && i === state.current;
          return `<li class="${completed || current ? 'active' : ''}"><strong>${label}</strong><small>${completed ? 'Completed' : (current ? 'Current stage' : 'Pending')}</small></li>`;
        }).join('')}</ol>
        ${showReturnNotice ? `<div class="mt-4 p-3 bg-error-container text-on-error-container text-xs font-bold">${returnStatus}</div>${x.returnRemark && x.returnRemark.text ? `<p class="mt-2 px-3 text-[10px] text-on-surface-variant leading-relaxed break-words">${x.returnRemark.text}</p>` : ''}` : ''}
      </div>`;
    }

    function workflowActions(x) {
      const actionMap = {
        ldStaff: { status: 'Pending L&D Review', title: 'L&D Verification', primary: 'Verify Sections C, D & E', primaryId: 'ldVerifyBtn', secondary: 'Return to Applicant' },
        ldHead: { status: 'Pending Head of L&D Concurrence', title: 'Head of L&D Concurrence', primary: 'Give Concurrence & Send for Final Approval', primaryId: 'ldConcurBtn', secondary: 'Return to L&D Staff' }
      };
      const cfg = actionMap[session.role];
      if (!cfg || canonicalStatus(x.status) !== cfg.status) return `<section class="card !bg-white"><p class="text-xs text-on-surface-variant">This application is not currently awaiting action from ${session.label}.</p></section>`;
      const approverSelector = session.role === 'ldHead' ? `
        <div class="field mb-6">
          <label for="finalApprover">Final Approver</label>
          <select id="finalApprover" class="bg-white text-sm" required>
            <option value="">Select final approver</option>
            ${FINAL_APPROVERS.map(approver => `<option value="${approver.key}" ${x.finalApprover && x.finalApprover.key === approver.key ? 'selected' : ''}>${approver.label}</option>`).join('')}
          </select>
          <small class="text-[10px] text-on-surface-variant">The selected approver and configured email will be used for the Teams Approval automation.</small>
          <div id="finalApproverError" class="text-[10px] font-bold text-error mt-1"></div>
        </div>` : '';
      return `<section class="card !bg-white border-l-4 border-primary">
        <h2 class="text-lg font-bold mb-2">${cfg.title}</h2>
        <p class="text-xs text-on-surface-variant mb-5">Complete the required review before continuing the approval process.</p>
        ${approverSelector}
        <div class="flex flex-wrap gap-3">
          ${session.role === 'ldStaff' ? '<button type="button" class="btn btn-ghost" id="saveLdBtn">Save</button>' : ''}
          <button type="button" class="btn btn-primary" id="${cfg.primaryId}">${cfg.primary}</button>
          <button type="button" class="btn btn-ghost border-error text-error" id="workflowReturnBtn">${cfg.secondary}</button>
        </div>
      </section>`;
    }

    function bindWorkflowActions(x, a) {
      const currentStatus = canonicalStatus(x.status);
      const isLdEditor = session.role === 'ldStaff' && currentStatus === 'Pending L&D Review';
      const isLdHeadAction = session.role === 'ldHead' && currentStatus === 'Pending Head of L&D Concurrence';

      // Head of L&D controls must be bound even though Sections D & E are read-only for this role.
      if (isLdHeadAction) {
        const commitHeadAction = (status, message) => {
          x.status = status;
          x.history = x.history || [];
          x.history.push({ at: new Date().toISOString(), text: message });
          saveApps(a);
          toast(message);
          detail();
        };
        const concur = $('#ldConcurBtn');
        if (concur) concur.onclick = () => {
          const selectedKey = val('finalApprover');
          const selectedApprover = FINAL_APPROVERS.find(approver => approver.key === selectedKey);
          const error = $('#finalApproverError');
          if (!selectedApprover) {
            if (error) error.textContent = 'Please select a final approver.';
            return;
          }
          if (error) error.textContent = '';
          x.finalApprover = { key: selectedApprover.key, label: selectedApprover.label, email: selectedApprover.email };
          commitHeadAction('Pending Final Approval', `Concurrence given by Head of L&D; forwarded to ${selectedApprover.label} through Teams Approvals`);
        };
        const finalApprover = $('#finalApprover');
        if (finalApprover) finalApprover.onchange = () => {
          const error = $('#finalApproverError');
          if (error) error.textContent = '';
        };
        const ret = $('#workflowReturnBtn');
        if (ret) ret.onclick = () => {
          const remark = window.prompt('Please enter the reason for returning this application to L&D Staff:');
          if (remark === null) return;
          const cleanedRemark = remark.trim();
          if (!cleanedRemark) {
            toast('A return remark is required');
            return;
          }
          x.returnRemark = { by: session.label, to: 'L&D Staff', text: cleanedRemark, at: new Date().toISOString() };
          commitHeadAction('Pending L&D Review', `Returned by Head of L&D to L&D Staff for revision. Remark: ${cleanedRemark}`);
        };
        return;
      }

      if (!isLdEditor) return;
      setupCurrencyInputs($('#app'));
      const financialIds = ['approvedBudget', 'expensesToDate', 'totalCost'];
      function updateResidualBalance() {
        if (!isLdEditor) return;
        const residual = currencyVal('approvedBudget') - currencyVal('expensesToDate') - currencyVal('totalCost');
        const display = $('#residualBalanceDisplay');
        if (display) display.textContent = money(residual);
        const hiddenBalance = document.getElementById('balance');
        if (hiddenBalance) hiddenBalance.value = residual.toFixed(2);
      }
      financialIds.forEach(id => { const input = document.getElementById(id); if (input) input.addEventListener('input', updateResidualBalance); });
      const ldCostIds = ['ldFee', 'ldTravel', 'ldHotel', 'ldOthers', 'ldTax'];
      function updateLdCostTotal() { if (!isLdEditor) return; const subtotal=['ldFee','ldTravel','ldHotel','ldOthers'].reduce((sum,id)=>sum+currencyVal(id),0); const revisedTotal=subtotal+currencyVal('ldTax'); const subtotalLabel=$('#ldCostSubtotal'); if(subtotalLabel) subtotalLabel.textContent=money(subtotal); const totalLabel = $('#ldCostTotal');
        if (totalLabel) totalLabel.textContent = money(revisedTotal);
        const totalCostField = document.getElementById('totalCost');
        if (totalCostField) { totalCostField.value = revisedTotal.toFixed(2); if (totalCostField.type === 'text') totalCostField.value = currencyDisplay(revisedTotal); }
        updateResidualBalance();
      }
      ldCostIds.forEach(id => { const input = document.getElementById(id); if (input) input.addEventListener('input', updateLdCostTotal); });
      updateLdCostTotal();
      updateResidualBalance();
      function updateMandaysBalance() {
        if (!isLdEditor) return;
        const target = Number(val('targetHours')) || 0;
        const achieved = Number(val('achievedHours')) || 0;
        const balance = Math.round(target - achieved);
        const display = $('#balanceHoursDisplay');
        if (display) display.textContent = String(balance);
        const hiddenBalance = document.getElementById('balanceHours');
        if (hiddenBalance) hiddenBalance.value = String(balance);
      }
      ['targetHours', 'achievedHours'].forEach(id => {
        const input = document.getElementById(id);
        if (input) input.addEventListener('input', updateMandaysBalance);
      });
      updateMandaysBalance();
      function collectLd() {
        if (!isLdEditor) return x.ld || {};
        const revisedCosts = {
          fee: currencyVal('ldFee'), travel: currencyVal('ldTravel'), hotel: currencyVal('ldHotel'), others: currencyVal('ldOthers'), tax: currencyVal('ldTax')
        };
        Object.assign(x.program, revisedCosts);
        const revisedTotal = total(x.program);
        const totalCostField = document.getElementById('totalCost');
        if (totalCostField) { totalCostField.value = revisedTotal.toFixed(2); if (totalCostField.type === 'text') totalCostField.value = currencyDisplay(revisedTotal); }
        const approved = currencyVal('approvedBudget'), spent = currencyVal('expensesToDate'), cost = revisedTotal;
        const target = Math.round(Number(val('targetHours')) || 0), achieved = Math.round(Number(val('achievedHours')) || 0);
        return { budgetType: val('budgetType'), approvedBudget: approved, expensesToDate: spent, totalCost: cost, balance: approved - spent - cost, evaluation: val('evaluation'), hrdc: val('hrdc'), targetHours: target, achievedHours: achieved, balanceHours: target - achieved };
      }
      function commit(status, message) { if (isLdEditor) x.ld = collectLd(); x.status = status; x.history.push({ at: new Date().toISOString(), text: message }); saveApps(a); toast(message); detail(); }
      const save = $('#saveLdBtn'); if (save) save.onclick = () => { x.ld = collectLd(); x.history.push({ at: new Date().toISOString(), text: 'Sections C, D & E saved by L&D Staff' }); saveApps(a); toast('Cost Estimates and Sections D & E saved'); detail(); };
      const verify = $('#ldVerifyBtn'); if (verify) verify.onclick = () => commit('Pending Head of L&D Concurrence', 'Sections C, D & E verified by L&D Staff; forwarded to Head of L&D');
      const concur = $('#ldConcurBtn');
      if (concur) concur.onclick = () => {
        const selectedKey = val('finalApprover');
        const selectedApprover = FINAL_APPROVERS.find(approver => approver.key === selectedKey);
        const error = $('#finalApproverError');
        if (!selectedApprover) {
          if (error) error.textContent = 'Please select a final approver.';
          return;
        }
        x.finalApprover = { key: selectedApprover.key, label: selectedApprover.label, email: selectedApprover.email };
        commit('Pending Final Approval', `Concurrence given by Head of L&D; forwarded to ${selectedApprover.label} through Teams Approvals`);
      };
      const ret = $('#workflowReturnBtn'); if (ret) ret.onclick = () => {
        const returnConfig = {
          ldStaff: { status: 'Returned to Applicant', recipient: 'Applicant', prompt: 'Please enter the reason for returning this application to the applicant:', message: 'Returned by L&D Staff for supplementary information' },
          ldHead: { status: 'Pending L&D Review', recipient: 'L&D Staff', prompt: 'Please enter the reason for returning this application to L&D Staff:', message: 'Returned by Head of L&D to L&D Staff for revision' }
        };
        const config = returnConfig[session.role];
        if (!config) return;
        const remark = window.prompt(config.prompt);
        if (remark === null) return;
        const cleanedRemark = remark.trim();
        if (!cleanedRemark) {
          toast('A return remark is required');
          return;
        }
        x.returnRemark = { by: session.label, to: config.recipient, text: cleanedRemark, at: new Date().toISOString() };
        commit(config.status, `${config.message}. Remark: ${cleanedRemark}`);
      };
    }

    function guard(role) { if (!session || session.role !== role) { route('welcome'); return false; } return true; }
    function guardAdmin() { if (!session || session.role === 'applicant') { route('welcome'); return false; } return true; }

    document.addEventListener('click', e => {
      const r = e.target.closest('[data-route]')?.dataset.route;
      if (r) { e.preventDefault(); route(r); }
    });

    $('#logoutBtn').onclick = () => {
      sessionStorage.clear();
      session = null;
      route('welcome');
    };

    window.addEventListener('hashchange', render);
    seed();
    migrateDemoData();
    migrateApplicantIdentity();
    render();
  </script>
</body></html>
